# AetherArena Production Environment
# Usage: make up
#
# Services:
#   - nginx:       Reverse proxy (port 2026, configurable via PORT env var)
#   - frontend:    Next.js production server
#   - gateway:     FastAPI Gateway API
#   - langgraph:   LangGraph production server (Dockerfile generated by langgraph dockerfile)
#   - provisioner: (optional) Sandbox provisioner for Kubernetes mode
#
# Key environment variables (set via environment/.env or scripts/deploy.sh):
#   AETHER_ARENA_HOME                   — runtime data dir, default $REPO_ROOT/backend/.aether-arena
#   AETHER_ARENA_CONFIG_PATH            — path to config.yaml
#   AETHER_ARENA_EXTENSIONS_CONFIG_PATH — path to extensions_config.json
#   AETHER_ARENA_DOCKER_SOCKET          — Docker socket path, default /var/run/docker.sock
#   AETHER_ARENA_REPO_ROOT              — repo root (used for skills host path in DooD)
#   BETTER_AUTH_SECRET               — required for frontend auth/session security
#
# LangSmith tracing is disabled by default (LANGCHAIN_TRACING_V2=false).
# Set LANGCHAIN_TRACING_V2=true and LANGSMITH_API_KEY in .env to enable it.
#
# Access: http://localhost:${PORT:-2026}

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aether-arena-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_started
      langgraph:
        condition: service_started
      searxng:
        condition: service_healthy
    networks:
      - aether-arena
    restart: unless-stopped

  # ── SearXNG (AGPL-3.0) — self-hosted web search backend ────────────────────
  searxng:
    container_name: aether-arena-searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-changeme-in-production}
      - SEARXNG_BASE_URL=http://localhost:${PORT:-2026}/searxng
      - SEARXNG_LIMITER=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aether-arena

  # ── Frontend: Next.js Production ───────────────────────────────────────────
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: aether-arena-frontend
    environment:
      # BETTER_AUTH_URL — set by deploy.sh to http://localhost:PORT dynamically
      # BETTER_AUTH_TRUSTED_ORIGINS is set via env_file (frontend/.env) — do not override here
      # Browser must reach APIs via the published URL (nginx :2026), not gateway:8001
      # (unpublished). Leave NEXT_PUBLIC_BACKEND_BASE_URL unset in ../frontend/.env
      # for same-origin /api/* through nginx, or set it to http://localhost:${PORT:-2026}.
      - SEARXNG_INTERNAL_URL=http://searxng:8080
      - INTERNAL_BACKEND_BASE_URL=http://gateway:8001
    env_file:
      - ../.env
      - ../frontend/.env
    networks:
      - aether-arena
    restart: unless-stopped

  # ── Gateway API ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: aether-arena-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - ${AETHER_ARENA_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ${AETHER_ARENA_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
      - ../skills:/app/skills:ro
      - ${AETHER_ARENA_HOME}:/app/backend/.aether-arena
      # DooD: AioSandboxProvider starts sandbox containers via host Docker daemon
      - ${AETHER_ARENA_DOCKER_SOCKET}:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      - AETHER_ARENA_HOME=/app/backend/.aether-arena
      # DooD path/network translation
      - AETHER_ARENA_HOST_BASE_DIR=${AETHER_ARENA_HOME}
      - AETHER_ARENA_HOST_SKILLS_PATH=${AETHER_ARENA_REPO_ROOT}/skills
      - AETHER_ARENA_SANDBOX_HOST=host.docker.internal
      # SearXNG internal URL (used by config.yaml $SEARXNG_URL substitution)
      - SEARXNG_URL=http://searxng:8080
      # LangGraph Server connection (for compact endpoint)
      - LANGGRAPH_BASE_URL=http://langgraph:2024
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aether-arena
    restart: unless-stopped

  # ── LangGraph Server ───────────────────────────────────────────────────────
  # TODO: switch to langchain/langgraph-api (licensed) once a license key is available.
  # For now, use `langgraph dev` (no license required) with the standard backend image.
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: aether-arena-langgraph
    command: sh -c "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
    volumes:
      - ${AETHER_ARENA_CONFIG_PATH}:/app/config.yaml:ro
      - ${AETHER_ARENA_EXTENSIONS_CONFIG_PATH}:/app/extensions_config.json:ro
      - ${AETHER_ARENA_HOME}:/app/backend/.aether-arena
      - ../skills:/app/skills:ro
      - ../backend/.langgraph_api:/app/backend/.langgraph_api
      # DooD: same as gateway
      - ${AETHER_ARENA_DOCKER_SOCKET}:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    environment:
      - CI=true
      - AETHER_ARENA_HOME=/app/backend/.aether-arena
      - AETHER_ARENA_CONFIG_PATH=/app/config.yaml
      - AETHER_ARENA_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - AETHER_ARENA_HOST_BASE_DIR=${AETHER_ARENA_HOME}
      - AETHER_ARENA_HOST_SKILLS_PATH=${AETHER_ARENA_REPO_ROOT}/skills
      - AETHER_ARENA_SANDBOX_HOST=host.docker.internal
      # SearXNG internal URL (used by config.yaml $SEARXNG_URL substitution)
      - SEARXNG_URL=http://searxng:8080
      # Disable LangSmith tracing — LANGSMITH_API_KEY is not required.
      # Set LANGCHAIN_TRACING_V2=true and LANGSMITH_API_KEY in .env to enable.
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aether-arena
    restart: unless-stopped

  # ── Sandbox Provisioner (optional, Kubernetes mode) ────────────────────────
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: aether-arena-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=aether-arena
      - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      - SKILLS_HOST_PATH=${AETHER_ARENA_REPO_ROOT}/skills
      - THREADS_HOST_PATH=${AETHER_ARENA_HOME}/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aether-arena
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
networks:
  aether-arena:
    driver: bridge
